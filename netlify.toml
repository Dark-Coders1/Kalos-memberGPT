[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # GEMINI_MODEL and MONGODB_URI are non-sensitive config values whose defaults
  # appear in .env.example, README, and seed.js. Omit them from secrets scanning.
  SECRETS_SCAN_OMIT_KEYS = "GEMINI_MODEL,MONGODB_URI"

[[plugins]]
  package = "@netlify/plugin-nextjs"
